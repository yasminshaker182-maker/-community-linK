<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CommunityLink</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- AUTH -->
<div id="authSidebar">
    <h2>CommunityLink</h2>

    <button onclick="showSignUp()">Sign Up</button>
    <button onclick="showSignIn()">Sign In</button>

    <div id="signupBox">
        <input id="su_name" placeholder="Name">
        <input id="su_email" placeholder="Email">
        <input id="su_phone" placeholder="Phone">
        <input id="su_password" type="password" placeholder="Password (8+ chars)">
        <button onclick="signup()">Create Account</button>
    </div>

    <div id="signinBox" style="display:none;">
        <input id="si_email" placeholder="Email">
        <input id="si_password" type="password" placeholder="Password">
        <button onclick="signin()">Login</button>
    </div>
</div>

<!-- MAIN -->
<div id="mainApp" style="display:none; margin-left:260px; padding:20px;">

<nav>
    <h2>CommunityLink</h2>
    <button onclick="logout()">Logout</button>
</nav>

<h3 id="welcomeText"></h3>

<input id="search" placeholder="Search opportunities...">

<div>
<button onclick="filterType('all')">All</button>
<button onclick="filterType('job')">Jobs</button>
<button onclick="filterType('event')">Events</button>
<button onclick="filterType('service')">Services</button>
</div>

<div id="cardsContainer"></div>

<h3>Add Opportunity</h3>

<input id="title" placeholder="Title">

<select id="type">
<option value="job">Job</option>
<option value="event">Event</option>
<option value="service">Service</option>
</select>

<textarea id="description" placeholder="Description"></textarea>

<button onclick="addOpportunity()">Add</button>

</div>

<script src="script.js"></script>
</body>
</html>
